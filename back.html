<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>背部舒缓练习</title>
<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    background:linear-gradient(160deg,#eef3ed,#fafaf8);
    color:#263238;
  }
  .app{max-width:860px;margin:auto;padding:18px 14px 50px}
  .hero,.card{
    background:#fff;
    border-radius:24px;
    padding:18px;
    margin-bottom:14px;
    box-shadow:0 10px 28px rgba(0,0,0,.07);
    border:1px solid #e5e7eb;
  }
  h1{margin:0 0 8px;font-size:30px}
  h2{margin:0 0 12px;font-size:20px}
  p{line-height:1.65;color:#68727d}
  .small{font-size:14px;color:#68727d}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:600px){.grid{grid-template-columns:1fr}}
  button{
    border:0;
    border-radius:16px;
    padding:13px 14px;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    font-family:inherit;
  }
  .mode{
    background:#f8fafc;
    border:1px solid #e5e7eb;
    text-align:left;
  }
  .mode.active{
    background:#eef3ed;
    border:2px solid #6b7d6a;
  }
  .mainbtn{background:#6b7d6a;color:#fff}
  .subbtn{background:#eef3ed;color:#526151}
  .danger{background:#fee2e2;color:#991b1b}
  .timer{
    text-align:center;
    background:#f8fafc;
    border-radius:22px;
    padding:18px;
    margin:12px 0;
  }
  .time{
    font-size:72px;
    font-weight:900;
    color:#526151;
    line-height:1;
    margin:10px 0;
  }
  .exercise{
    display:grid;
    grid-template-columns:auto 1fr auto;
    gap:10px;
    align-items:center;
    padding:13px;
    border:1px solid #e5e7eb;
    border-radius:18px;
    margin-bottom:10px;
    background:#fff;
  }
  .exercise.done{background:#f0fdf4;border-color:#bbf7d0}
  .num{
    width:32px;height:32px;border-radius:12px;
    background:#eef3ed;
    display:grid;place-items:center;
    font-weight:800;color:#526151;
  }
