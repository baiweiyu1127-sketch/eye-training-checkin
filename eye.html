<!doctype html>

<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>弱视斜视训练打卡</title>
  <meta name="theme-color" content="#f6efe7" />
  <style>
    :root {
      --bg: #f7f2ec;
      --card: #fffaf6;
      --text: #2b2521;
      --muted: #7b6c62;
      --line: #e3d6ca;
      --main: #9b6a4d;
      --main-dark: #754a34;
      --soft: #f0e4d9;
      --green-bg: #edf6ef;
      --green-line: #c7dfcc;
      --yellow-bg: #fff4dd;
      --yellow-line: #e7c994;
      --red-bg: #fff1ea;
      --red-line: #e8c5b7;
      --shadow: 0 14px 34px rgba(81, 56, 40, .11);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #fff8ef 0%, var(--bg) 42%, #eee4da 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 920px; margin: 0 auto; padding: 22px 14px 46px; }
    header { padding: 10px 2px 6px; }
    h1 { margin: 0 0 8px; font-size: clamp(28px, 6vw, 42px); letter-spacing: -0.05em; }
    h2 { margin: 0 0 12px; font-size: 20px; letter-spacing: -0.02em; }
    p { color: var(--muted); line-height: 1.7; margin: 0; }
    .grid { display: grid; grid-template-columns: 1.16fr .84fr; gap: 16px; align-items: start; margin-top: 16px; }
    @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: rgba(255, 250, 246, .92);
      border: 1px solid rgba(227, 214, 202, .95);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 17px;
      backdrop-filter: blur(10px);
    }
    .top { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
    .date { font-size: 14px; color: var(--muted); line-height: 1.5; }
    .pill { border-radius: 999px; background: var(--soft); color: #694b3c; padding: 8px 12px; font-size: 13px; white-space: nowrap; }
    .task { display: grid; grid-template-columns: 30px 1fr auto; gap: 10px; border-top: 1px solid var(--line); padding: 13px 0; align-items: start; }
    .task:first-child { border-top: 0; }
    input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--main); margin-top: 2px; }
    .task-title { font-weight: 800; margin-bottom: 4px; }
    .desc { color: var(--muted); font-size: 14px; line-height: 1.58; }
    .time { font-size: 12px; background: var(--soft); border-radius: 999px; padding: 6px 8px; color: #654a3c; white-space: nowrap; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    @media (max-width: 520px) { .form-grid { grid-template-columns: 1fr; } }
    label { display: block; color: var(--muted); font-size: 13px; margin-bottom: 7px; }
    select, textarea, button, input[type="date"] {
      width: 100%; font: inherit; border: 1px solid var(--line); border-radius: 14px;
      padding: 11px 12px; background: #fffdf9; color: var(--text); outline: none;
    }
    textarea { min-height: 84px; resize: vertical; line-height: 1.55; }
    button { border: 0; cursor: pointer; background: var(--main); color: white; font-weight: 800; transition: transform .12s ease, opacity .12s ease; }
    button:active { transform: scale(.985); }
    button.secondary { background: var(--soft); color: #654a3c; border: 1px solid var(--line); }
    button.danger { background: var(--red-bg); color: #8c3d2d; border: 1px solid var(--red-line); }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    @media (max-width: 520px) { .actions { grid-template-columns: 1fr; } }
    .warn { margin-top: 12px; background: var(--red-bg); border: 1px solid var(--red-line); color: #7f3d2f; border-radius: 17px; padding: 12px; line-height: 1.65; font-size: 14px; }
    .big { font-size: 42px; font-weight: 900; letter-spacing: -0.06em; margin: 2px 0 8px; }
    .bar { height: 15px; background: #eaded4; border-radius: 999px; overflow: hidden; border: 1px solid #decfc3; }
    .bar span { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, #d8b79d, var(--main)); border-radius: 999px; transition: width .25s ease; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 12px 0 16px; }
    .stat { background: #fffdf9; border: 1px solid var(--line); border-radius: 16px; padding: 10px; }
    .stat b { display: block; font-size: 23px; margin-bottom: 2px; }
    .stat span { color: var(--muted); font-size: 12px; }
    .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 7px; }
    .day { min-height: 54px; border-radius: 14px; border: 1px solid var(--line); background: #fffdf9; padding: 7px; font-size: 12px; color: var(--muted); display: flex; flex-direction: column; justify-content: space-between; }
    .day.done { background: var(--green-bg); border-color: var(--green-line); color: #416849; }
    .day.partial { background: var(--yellow-bg); border-color: var(--yellow-line); color: #7a5720; }
    .day.today { box-shadow: 0 0 0 2px rgba(155, 106, 77, .25) inset; }
    .mark { font-size: 18px; line-height: 1; font-weight: 900; }
    .tiny { color: var(--muted); font-size: 12px; line-height: 1.6; margin-top: 8px; }
    .toast { position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%); background: rgba(43, 37, 33, .92); color: white; padding: 10px 14px; border-radius: 999px; font-size: 14px; opacity: 0; pointer-events: none; transition: .2s ease; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>弱视斜视训练打卡</h1>
      <p>每天 8—10 分钟。短、轻、稳地练。明显头晕、恶心、眼痛、重影持续不消失，就停止。</p>
    </header><div class="grid">
  <main class="card">
    <div class="top">
      <div>
        <h2>今天训练</h2>
        <div class="date" id="dateText"></div>
      </div>
      <div class="pill" id="statusPill">未打卡</div>
    </div>

    <div id="taskBox"></div>

    <div class="form-grid">
      <div>
        <label for="fatigue">眼睛疲劳程度</label>
        <select id="fatigue">
          <option value="">请选择</option>
          <option value="1">1 - 很轻松</option>
          <option value="2">2 - 轻微疲劳</option>
          <option value="3">3 - 一般疲劳</option>
          <option value="4">4 - 比较累</option>
          <option value="5">5 - 很累，明天减量</option>
        </select>
      </div>
      <div>
        <label for="dizzy">是否头晕/不适</label>
        <select id="dizzy">
          <option value="">请选择</option>
          <option value="否">否</option>
          <option value="轻微">轻微</option>
          <option value="明显，已停止">明显，已停止</option>
        </select>
      </div>
    </div>

    <div style="margin-top: 10px;">
      <label for="note">备注</label>
      <textarea id="note" placeholder="比如：遮眼1分钟有点晕；今天练完还行。"></textarea>
    </div>

    <div class="actions">
      <button id="saveBtn">保存今天打卡</button>
      <button class="secondary" id="lazyBtn">懒人版完成</button>
    </div>
    <div class="actions">
      <button class="secondary" id="exportBtn">导出记录 CSV</button>
      <button class="danger" id="clearBtn">清空记录</button>
    </div>

    <div class="warn">
      <strong>提醒：</strong>练完应该是“眼睛活动开了”，不是“被掏空”。如果当天不舒服，只做远近切换也算维护。
    </div>
  </main>

  <aside class="card">
    <h2>最近 28 天完成率</h2>
    <div class="big" id="percentText">0%</div>
    <div class="bar"><span id="barFill"></span></div>

    <div class="stats">
      <div class="stat"><b id="doneCount">0</b><span>完整完成</span></div>
      <div class="stat"><b id="partialCount">0</b><span>部分完成</span></div>
      <div class="stat"><b id="streakCount">0</b><span>连续天数</span></div>
    </div>

    <h2>最近 28 天</h2>
    <div class="days" id="daysBox"></div>
    <p class="tiny">绿色=完整完成，黄色=懒人版/部分完成。别追求完美，能继续就很好。</p>

    <div class="warn" style="background:#fff8ee;border-color:#ead1a9;color:#775622;">
      <strong>懒人版：</strong>远近切换 2 分钟 + 笔尖靠近 2 分钟 + 弱视眼看字 3 分钟。总共 7 分钟，也算完成。
    </div>
  </aside>
</div>

  </div>
  <div class="toast" id="toast">已保存</div>  <script>
    const tasks = [
      ["nearFar", "远近切换", "2分钟", "看近处笔尖/手指 3 秒，再看远处墙面或窗外目标 3 秒，来回切换。"],
      ["pencil", "笔尖靠近训练", "2分钟", "笔放眼前约 40cm，盯住笔尖慢慢靠近鼻尖；重影或不适就退回。"],
      ["weakEye", "弱视眼精细使用", "3分钟", "轻遮好眼，用弱视眼看小字、微信读书、找不同或数图案。头晕就改成 1 分钟 × 3 组。"],
      ["tracking", "双眼追踪放松", "1-2分钟", "手指在眼前慢慢画横 8 字，眼睛跟着走，头不要动。"],
      ["rest", "闭眼休息", "1分钟", "闭眼放松，深呼吸几次。练完不要立刻猛刷手机。"]
    ];

    const storageKey = "eye_training_checkins_v3";
    const $ = (id) => document.getElementById(id);
    const pad = (n) => String(n).padStart(2, "0");
    const dateKey = (d) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const todayKey = () => dateKey(new Date());

    function loadAll() {
      try { return JSON.parse(localStorage.getItem(storageKey) || "{}"); }
      catch { return {}; }
    }
    function saveAll(data) { localStorage.setItem(storageKey, JSON.stringify(data)); }
    function toast(text) {
      const el = $("toast");
      el.textContent = text;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 1500);
    }
    function renderDate() {
      const d = new Date();
      const w = ["日", "一", "二", "三", "四", "五", "六"][d.getDay()];
      $("dateText").textContent = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 星期${w}`;
    }
    function renderTasks(record = {}) {
      $("taskBox").innerHTML = tasks.map(t => `
        <div class="task">
          <input type="checkbox" id="${t[0]}" ${record.items?.[t[0]] ? "checked" : ""} />
          <div><div class="task-title">${t[1]}</div><div class="desc">${t[3]}</div></div>
          <div class="time">${t[2]}</div>
        </div>
      `).join("");
    }
    function hydrateToday() {
      renderDate();
      const rec = loadAll()[todayKey()] || {};
      renderTasks(rec);
      $("fatigue").value = rec.fatigue || "";
      $("dizzy").value = rec.dizzy || "";
      $("note").value = rec.note || "";
      updatePill(rec.type);
      renderSummary();
    }
    function collect(typeOverride = null) {
      const items = {};
      tasks.forEach(t => items[t[0]] = $(t[0]).checked);
      const count = Object.values(items).filter(Boolean).length;
      let type = typeOverride || (count === tasks.length ? "done" : count > 0 ? "partial" : "none");
      return {
        date: todayKey(),
        type,
        items,
        count,
        fatigue: $("fatigue").value,
        dizzy: $("dizzy").value,
        note: $("note").value.trim(),
        updatedAt: new Date().toISOString()
      };
    }
    function updatePill(type) {
      const pill = $("statusPill");
      if (type === "done") { pill.textContent = "今日已完整完成"; pill.style.background = "#e3f0e5"; pill.style.color = "#406b47"; }
      else if (type === "partial") { pill.textContent = "今日已部分完成"; pill.style.background = "#fff1d9"; pill.style.color = "#7c5a23"; }
      else { pill.textContent = "未打卡"; pill.style.background = "#f0e4d9"; pill.style.color = "#694b3c"; }
    }
    function saveToday(typeOverride = null) {
      const all = loadAll();
      const rec = collect(typeOverride);
      all[rec.date] = rec;
      saveAll(all);
      updatePill(rec.type);
      renderSummary();
      toast("已保存今天打卡");
    }
    function markLazy() {
      tasks.forEach(t => { $(t[0]).checked = ["nearFar", "pencil", "weakEye"].includes(t[0]); });
      saveToday("partial");
    }
    function renderSummary() {
      const all = loadAll();
      const now = new Date();
      const days = [];
      for (let i = 27; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(now.getDate() - i);
        const k = dateKey(d);
        days.push({ date: d, key: k, rec: all[k] });
      }
      const done = days.filter(x => x.rec?.type === "done").length;
      const partial = days.filter(x => x.rec?.type === "partial").length;
      const percent = Math.round(((done + partial * 0.6) / 28) * 100);
      $("doneCount").textContent = done;
      $("partialCount").textContent = partial;
      $("percentText").textContent = percent + "%";
      $("barFill").style.width = percent + "%";

      let streak = 0;
      for (let i = days.length - 1; i >= 0; i--) {
        if (["done", "partial"].includes(days[i].rec?.type)) streak++;
        else break;
      }
      $("streakCount").textContent = streak;

      $("daysBox").innerHTML = days.map(x => {
        const cls = x.rec?.type === "done" ? "done" : x.rec?.type === "partial" ? "partial" : "";
        const mark = x.rec?.type === "done" ? "✓" : x.rec?.type === "partial" ? "•" : "";
        const isToday = x.key === todayKey() ? "today" : "";
        return `<div class="day ${cls} ${isToday}"><span>${x.date.getMonth()+1}/${x.date.getDate()}</span><span class="mark">${mark}</span></div>`;
      }).join("");
    }
    function exportCSV() {
      const all = loadAll();
      const rows = [["日期", "状态", "完成项目数", "疲劳程度", "头晕/不适", "备注", "更新时间"]];
      Object.keys(all).sort().forEach(k => {
        const r = all[k];
        const status = r.type === "done" ? "完整完成" : r.type === "partial" ? "部分完成" : "未完成";
        rows.push([r.date, status, r.count || 0, r.fatigue || "", r.dizzy || "", r.note || "", r.updatedAt || ""]);
      });
      const csv = "\uFEFF" + rows.map(row => row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(",")).join("\n");
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv;charset=utf-8" }));
      a.download = "弱视斜视训练打卡记录.csv";
      a.click();
      URL.revokeObjectURL(a.href);
    }
    function clearAll() {
      if (confirm("确定要清空所有打卡记录吗？")) {
        localStorage.removeItem(storageKey);
        hydrateToday();
        toast("记录已清空");
      }
    }

    $("saveBtn").addEventListener("click", () => saveToday());
    $("lazyBtn").addEventListener("click", markLazy);
    $("exportBtn").addEventListener("click", exportCSV);
    $("clearBtn").addEventListener("click", clearAll);
    hydrateToday();
  </script></body>
</html>
